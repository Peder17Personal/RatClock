<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RatClock Alarms</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
input, button { margin: 5px; }
#alarms { margin-top: 20px; }
</style>
</head>
<body>

<h1>RatClock Alarm Manager</h1>

<div>
    <input type="text" id="description" placeholder="Alarm description">
    <input type="time" id="time">
    <button onclick="addAlarm()">Add Alarm</button>
</div>

<div id="alarms">
    <h2>Alarms</h2>
    <ul id="alarmList"></ul>
</div>

<script>
const apiUrl = "http://127.0.0.1:5000/api/alarms";

async function fetchAlarms() {
    const response = await fetch(apiUrl);
    const alarms = await response.json();
    const list = document.getElementById('alarmList');
    list.innerHTML = '';
    alarms.forEach(alarm => {
        const li = document.createElement('li');
        li.textContent = `${alarm.description} - ${alarm.time}`;
        list.appendChild(li);
    });
}

async function addAlarm() {
    const description = document.getElementById('description').value;
    const time = document.getElementById('time').value;

    if (!description || !time) {
        alert("Please enter description and time");
        return;
    }

    const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description, time })
    });

    if (response.ok) {
        document.getElementById('description').value = '';
        document.getElementById('time').value = '';
        fetchAlarms();
    } else {
        alert("Failed to add alarm");
    }
}

// Load alarms every 2 seconds
setInterval(fetchAlarms, 2000);
fetchAlarms();
</script>

</body>
</html>
